<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>connec+a Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ===== RESET & VARS ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1c2340;--ink-mid:#2a3d7a;--ink-soft:#5a6a9a;--ink-pale:#c4ceec;
  --bg:#f7f8fc;--bg2:#eef0f8;--white:#ffffff;
  --rose:#e8a0b8;--violet:#7060a8;--amber:#c85a20;--sky:#7aa8cc;
  --green:#3d6640;--red:#c53030;--border:rgba(42,61,122,.12);
  --s1:0 2px 12px rgba(28,35,64,.07);--s2:0 6px 28px rgba(28,35,64,.12);--s3:0 16px 48px rgba(28,35,64,.18);
  --r:16px;--rs:10px;
}
html{scroll-behavior:smooth;}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;line-height:1.6;}

/* ===== SVG ICON SYSTEM ===== */
.icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon svg{width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.icon-sm svg{width:14px;height:14px;}
.icon-md svg{width:18px;height:18px;}
.icon-lg svg{width:22px;height:22px;}
.icon-xl svg{width:28px;height:28px;}

/* ===== BACKGROUND ===== */
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(112,96,168,.12) 0%,transparent 55%),
             radial-gradient(ellipse 60% 50% at 90% 100%,rgba(122,168,204,.1) 0%,transparent 55%),var(--bg);}
.bg-noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.season-bar{height:3px;background:linear-gradient(90deg,var(--violet) 0%,var(--sky) 50%,var(--amber) 100%);position:relative;z-index:101;}

/* ===== HEADER ===== */
.header{position:sticky;top:0;z-index:100;background:rgba(247,248,252,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;transition:box-shadow .3s;}
.header.scrolled{box-shadow:0 4px 20px rgba(28,35,64,.1);}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer;transition:opacity .2s;}
.logo:hover{opacity:.8;}
.logo-icon{width:30px;height:30px;background:var(--ink);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif JP",serif;font-size:.55rem;color:#fff;font-weight:700;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.logo:hover .logo-icon{transform:rotate(-8deg) scale(1.12);}
.logo-name{font-family:"Noto Serif JP",serif;font-size:.95rem;color:var(--ink);font-weight:700;letter-spacing:.06em;}
.logo-name span{color:var(--violet);}
.admin-badge{font-size:.58rem;background:var(--violet);color:#fff;padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:.06em;margin-left:6px;}
.header-right{display:flex;align-items:center;gap:8px;}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:var(--violet);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif JP",serif;font-size:.72rem;color:#fff;font-weight:700;transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;}
.avatar-btn:hover{transform:scale(1.12);box-shadow:0 4px 16px rgba(112,96,168,.3);}

/* ===== SIDEBAR NAV ===== */
.app-layout{display:flex;min-height:calc(100vh - 59px);position:relative;z-index:2;}
.sidebar{width:220px;background:rgba(247,248,252,.96);backdrop-filter:blur(18px);border-right:1px solid var(--border);padding:18px 10px;flex-shrink:0;overflow-y:auto;position:sticky;top:59px;height:calc(100vh - 59px);}
.sidebar-section{margin-bottom:16px;}
.sidebar-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-pale);padding:0 12px;margin-bottom:6px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rs);cursor:pointer;color:var(--ink-soft);font-size:.82rem;font-weight:500;transition:all .18s;border:none;background:none;width:100%;text-align:left;font-family:"Noto Sans JP",sans-serif;}
.sidebar-item:hover{background:var(--bg2);color:var(--ink);}
.sidebar-item.active{background:rgba(112,96,168,.1);color:var(--violet);font-weight:600;}
.sidebar-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.sidebar-badge{font-size:.6rem;background:var(--amber);color:#fff;padding:1px 7px;border-radius:99px;margin-left:auto;font-weight:700;}
.main-content{flex:1;padding:24px 28px 80px;max-width:920px;overflow-y:auto;}

/* ===== CARDS & COMPONENTS ===== */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--s1);margin-bottom:16px;overflow:hidden;transition:box-shadow .2s;}
.card:hover{box-shadow:var(--s2);}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:"Noto Serif JP",serif;font-size:.92rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;}
.card-body{padding:20px;}
.section-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.section-head-text{font-family:"Noto Serif JP",serif;font-size:1.1rem;font-weight:700;color:var(--ink);white-space:nowrap;}
.section-head-line{flex:1;height:1px;background:var(--border);}
.form-group{margin-bottom:14px;}
.form-label{font-size:.78rem;font-weight:600;color:var(--ink-mid);margin-bottom:5px;display:block;}
.form-label-opt{font-size:.68rem;color:var(--ink-soft);font-weight:400;}
.form-control{width:100%;padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.86rem;color:var(--ink);background:var(--white);outline:none;font-family:"Noto Sans JP",sans-serif;transition:border-color .2s,box-shadow .2s;}
.form-control:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(112,96,168,.1);}
select.form-control{cursor:pointer;}
textarea.form-control{resize:vertical;min-height:60px;}
.form-row{display:flex;gap:12px;}
.form-row .form-group{flex:1;}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:var(--rs);font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .22s;font-family:"Noto Sans JP",sans-serif;}
.btn-primary{background:var(--violet);color:#fff;box-shadow:0 2px 8px rgba(112,96,168,.3);}
.btn-primary:hover{background:#5d4f96;transform:translateY(-1px);box-shadow:0 4px 14px rgba(112,96,168,.35);}
.btn-primary:active{transform:translateY(0);}
.btn-outline{background:transparent;color:var(--ink-mid);border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--ink-mid);background:var(--bg2);}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#a82828;}
.btn-sm{padding:5px 12px;font-size:.74rem;}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;background:transparent;border:1.5px solid var(--border);cursor:pointer;color:var(--ink-soft);transition:all .2s;}
.btn-icon:hover{background:var(--bg2);color:var(--ink);border-color:var(--ink-soft);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

/* ===== ALERTS ===== */
.alert{padding:10px 16px;border-radius:var(--rs);font-size:.82rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.alert-ok{background:rgba(61,102,64,.08);color:var(--green);border:1px solid rgba(61,102,64,.15);}
.alert-err{background:rgba(197,48,48,.06);color:var(--red);border:1px solid rgba(197,48,48,.12);}
.alert-info{background:rgba(112,96,168,.06);color:var(--violet);border:1px solid rgba(112,96,168,.12);}

/* ===== BADGE ===== */
.badge{font-size:.66rem;font-weight:700;padding:3px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:4px;}
.badge-violet{background:rgba(112,96,168,.1);color:var(--violet);}
.badge-green{background:rgba(61,102,64,.1);color:var(--green);}
.badge-amber{background:rgba(200,90,32,.08);color:var(--amber);}
.badge-red{background:rgba(197,48,48,.08);color:var(--red);}
.badge-sky{background:rgba(122,168,204,.12);color:var(--sky);}

/* ===== STAT CARDS ===== */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:16px;box-shadow:var(--s1);transition:transform .2s,box-shadow .2s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--s2);}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}
.stat-icon-violet{background:rgba(112,96,168,.12);color:var(--violet);}
.stat-icon-rose{background:rgba(232,160,184,.15);color:var(--rose);}
.stat-icon-amber{background:rgba(200,90,32,.1);color:var(--amber);}
.stat-icon-green{background:rgba(61,102,64,.1);color:var(--green);}
.stat-icon-sky{background:rgba(122,168,204,.12);color:var(--sky);}
.stat-num{font-family:"Noto Serif JP",serif;font-size:1.4rem;font-weight:700;color:var(--ink);line-height:1.2;}
.stat-label{font-size:.72rem;color:var(--ink-soft);font-weight:500;margin-top:2px;}

/* ===== TABLE ===== */
.table-wrap{overflow-x:auto;border-radius:var(--rs);}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
th{text-align:left;padding:10px 14px;font-weight:600;color:var(--ink-soft);border-bottom:2px solid var(--border);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--ink);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(112,96,168,.03);}
.td-actions{display:flex;gap:4px;}

/* ===== TABS ===== */
.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0;}
.tab-btn{padding:8px 16px;font-size:.82rem;font-weight:600;color:var(--ink-soft);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;font-family:"Noto Sans JP",sans-serif;display:flex;align-items:center;gap:6px;}
.tab-btn:hover{color:var(--ink);}
.tab-btn.active{color:var(--violet);border-bottom-color:var(--violet);}
.tab-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;}
.tab-pane{display:none;}
.tab-pane.active{display:block;animation:fadeIn .25s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(28,35,64,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--white);border-radius:var(--r);box-shadow:var(--s3);max-width:640px;width:100%;max-height:85vh;overflow-y:auto;transform:translateY(20px) scale(.97);transition:transform .25s cubic-bezier(.4,0,.2,1);padding:24px;}
.modal-overlay.open .modal{transform:translateY(0) scale(1);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-family:"Noto Serif JP",serif;font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--ink-soft);padding:4px;border-radius:6px;transition:background .2s;}
.modal-close:hover{background:var(--bg2);}
.modal-close svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;}

/* ===== QR SCANNER ===== */
.qr-scan-area{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;}
.qr-video-wrap{width:280px;height:280px;border-radius:var(--r);overflow:hidden;border:3px solid var(--violet);position:relative;background:#000;}
.qr-video-wrap video{width:100%;height:100%;object-fit:cover;}
.qr-manual{width:100%;max-width:320px;}
.qr-manual-row{display:flex;gap:8px;}
.qr-result{text-align:center;padding:16px;border-radius:var(--rs);background:rgba(61,102,64,.06);border:1px solid rgba(61,102,64,.15);margin-top:12px;}

/* ===== CHAT ===== */
.chat-container{display:flex;flex-direction:column;height:400px;}
.chat-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.chat-thread{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:var(--rs);cursor:pointer;transition:background .2s;}
.chat-thread:hover{background:var(--bg2);}
.chat-thread.active{background:rgba(112,96,168,.08);}
.chat-thread-avatar{width:36px;height:36px;border-radius:50%;background:var(--ink);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.72rem;font-weight:700;font-family:"Noto Serif JP",serif;flex-shrink:0;}
.chat-thread-info{flex:1;min-width:0;}
.chat-thread-name{font-size:.82rem;font-weight:600;color:var(--ink);}
.chat-thread-preview{font-size:.72rem;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-thread-time{font-size:.62rem;color:var(--ink-pale);white-space:nowrap;}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;}
.chat-bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:.82rem;line-height:1.5;}
.chat-bubble.admin{align-self:flex-end;background:var(--violet);color:#fff;border-bottom-right-radius:4px;}
.chat-bubble.user{align-self:flex-start;background:var(--bg2);color:var(--ink);border-bottom-left-radius:4px;}
.chat-bubble-time{font-size:.6rem;opacity:.6;margin-top:3px;}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);}
.chat-input{flex:1;padding:8px 14px;border:1.5px solid var(--border);border-radius:99px;font-size:.82rem;outline:none;font-family:"Noto Sans JP",sans-serif;transition:border-color .2s;}
.chat-input:focus{border-color:var(--violet);}
.chat-send-btn{background:var(--violet);color:#fff;border:none;padding:8px 16px;border-radius:99px;cursor:pointer;font-size:.78rem;font-weight:600;transition:background .2s;display:flex;align-items:center;gap:4px;}
.chat-send-btn:hover{background:#5d4f96;}

/* ===== TODO ===== */
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .18s;}
.todo-item:last-child{border-bottom:none;}
.todo-item:hover{background:rgba(112,96,168,.03);}
.todo-check{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.todo-check.done{background:var(--green);border-color:var(--green);}
.todo-check.done svg{stroke:#fff;}
.todo-check svg{width:12px;height:12px;stroke:transparent;fill:none;stroke-width:3;stroke-linecap:round;}
.todo-text{flex:1;font-size:.84rem;min-width:0;}
.todo-text.done{text-decoration:line-through;color:var(--ink-pale);}
.todo-due{font-size:.66rem;white-space:nowrap;padding:2px 8px;border-radius:99px;font-weight:600;}
.todo-due-normal{color:var(--ink-soft);background:var(--bg2);}
.todo-due-soon{color:var(--amber);background:rgba(200,90,32,.08);}
.todo-due-overdue{color:var(--red);background:rgba(197,48,48,.08);}
.todo-due-none{color:var(--ink-pale);font-style:italic;}
.todo-add-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);flex-wrap:wrap;}
.todo-add-input{flex:1;min-width:160px;padding:7px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.82rem;outline:none;font-family:"Noto Sans JP",sans-serif;}
.todo-add-input:focus{border-color:var(--violet);}
.todo-date-input{padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.76rem;outline:none;font-family:"Noto Sans JP",sans-serif;color:var(--ink-mid);cursor:pointer;min-width:130px;}
.todo-date-input:focus{border-color:var(--violet);}

/* ===== SCHEDULE ===== */
.schedule-date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.schedule-date-label{font-family:"Noto Serif JP",serif;font-size:1rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;}
.schedule-date-sub{font-size:.72rem;font-weight:400;color:var(--ink-soft);margin-left:4px;}
.schedule-date-today{font-size:.62rem;font-weight:700;background:var(--violet);color:#fff;padding:2px 8px;border-radius:99px;cursor:pointer;transition:background .2s;}
.schedule-date-today:hover{background:#5d4f96;}
.schedule-nav-btn{background:none;border:1.5px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .22s;color:var(--ink-soft);}
.schedule-nav-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
.schedule-nav-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.schedule-weekdays{display:flex;gap:4px;margin-bottom:16px;}
.schedule-weekday{flex:1;text-align:center;padding:8px 4px;border-radius:var(--rs);cursor:pointer;transition:all .18s;border:1.5px solid transparent;}
.schedule-weekday:hover{background:var(--bg2);}
.schedule-weekday.active{background:rgba(112,96,168,.1);border-color:var(--violet);}
.schedule-weekday.today{font-weight:700;}
.schedule-wd-name{font-size:.6rem;color:var(--ink-soft);font-weight:600;text-transform:uppercase;}
.schedule-wd-num{font-size:.88rem;font-weight:700;color:var(--ink);margin-top:2px;}
.schedule-weekday.active .schedule-wd-num{color:var(--violet);}
.schedule-section-label{font-size:.7rem;font-weight:700;color:var(--ink-pale);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;display:flex;align-items:center;gap:8px;}
.schedule-section-label::after{content:"";flex:1;height:1px;background:var(--border);}
.schedule-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.schedule-item:last-child{border-bottom:none;}
.schedule-time{font-size:.78rem;font-weight:700;color:var(--violet);white-space:nowrap;min-width:70px;}
.schedule-body{flex:1;}
.schedule-title{font-size:.84rem;font-weight:600;color:var(--ink);}
.schedule-desc{font-size:.74rem;color:var(--ink-soft);margin-top:2px;}
.schedule-empty{text-align:center;padding:32px 20px;color:var(--ink-soft);font-size:.84rem;}
.schedule-add-row{display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--border);margin-top:8px;flex-wrap:wrap;}
.schedule-add-input{padding:7px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.82rem;outline:none;font-family:"Noto Sans JP",sans-serif;}
.schedule-add-input:focus{border-color:var(--violet);}

/* ===== CUSTOM QUESTION BUILDER ===== */
.cq-list{display:flex;flex-direction:column;gap:10px;}
.cq-item{background:var(--bg2);border-radius:var(--rs);padding:12px 14px;position:relative;border:1px solid transparent;transition:border-color .2s;}
.cq-item:hover{border-color:var(--border);}
.cq-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.cq-item-type{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:99px;background:rgba(112,96,168,.1);color:var(--violet);}
.cq-item-label{font-size:.84rem;font-weight:600;color:var(--ink);}
.cq-item-options{font-size:.74rem;color:var(--ink-soft);margin-top:4px;}
.cq-item-actions{display:flex;gap:4px;}

/* ===== REFERRAL SOURCE MANAGER ===== */
.ref-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;background:var(--bg2);border:1px solid var(--border);font-size:.78rem;color:var(--ink);margin:3px;transition:all .2s;}
.ref-tag:hover{border-color:var(--ink-soft);}
.ref-tag-remove{cursor:pointer;color:var(--ink-soft);transition:color .2s;}
.ref-tag-remove:hover{color:var(--red);}

/* ===== VENUE MAP ===== */
.venue-map-wrap{width:100%;height:260px;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);margin-top:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:.82rem;}
.venue-map-wrap iframe{width:100%;height:100%;border:0;}
.venue-search-row{display:flex;gap:8px;margin-bottom:8px;}
.venue-search-input{flex:1;padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.82rem;outline:none;font-family:"Noto Sans JP",sans-serif;}
.venue-search-input:focus{border-color:var(--violet);}
.venue-coords{display:flex;gap:8px;margin-top:8px;}
.venue-coords input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.76rem;text-align:center;outline:none;font-family:"Noto Sans JP",sans-serif;}

/* ===== POST-REG MESSAGE CONFIG ===== */
.msg-config-section{background:var(--bg2);border-radius:var(--rs);padding:14px;margin-bottom:10px;border:1px solid transparent;transition:border-color .2s;}
.msg-config-section:hover{border-color:var(--border);}
.msg-config-title{font-size:.78rem;font-weight:700;color:var(--ink-mid);margin-bottom:8px;display:flex;align-items:center;gap:6px;}

/* ===== PARTICIPATION RESTRICTION ===== */
.restriction-option{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--rs);margin-bottom:6px;border:1.5px solid var(--border);cursor:pointer;transition:all .2s;}
.restriction-option:hover{border-color:var(--ink-soft);}
.restriction-option.selected{border-color:var(--violet);background:rgba(112,96,168,.06);}
.restriction-option input[type="radio"]{accent-color:var(--violet);}

/* ===== SURVEY STATS ===== */
.survey-stat-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.survey-stat-label{font-size:.74rem;font-weight:600;color:var(--ink-mid);min-width:24px;text-align:right;}
.survey-stat-fill{height:22px;border-radius:4px;background:var(--violet);min-width:2px;display:flex;align-items:center;justify-content:flex-end;padding:0 6px;font-size:.6rem;color:#fff;font-weight:700;transition:width .6s cubic-bezier(.4,0,.2,1);}
.survey-stat-count{font-size:.68rem;color:var(--ink-soft);min-width:24px;}
.survey-avg{font-family:"Noto Serif JP",serif;font-size:2.2rem;font-weight:700;color:var(--violet);line-height:1;}
.survey-avg-label{font-size:.72rem;color:var(--ink-soft);margin-top:2px;}

/* ===== SPINNER ===== */
.spinner{width:28px;height:28px;border:3px solid var(--bg2);border-top-color:var(--violet);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);}
.empty-state svg{width:48px;height:48px;stroke:var(--ink-pale);fill:none;stroke-width:1.5;margin-bottom:12px;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{display:none;}
  .main-content{padding:16px 14px 80px;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .form-row{flex-direction:column;gap:0;}
  .mobile-nav{display:flex!important;}
}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:99;background:rgba(247,248,252,.96);backdrop-filter:blur(18px);border-top:1px solid var(--border);height:62px;align-items:center;justify-content:space-around;}
.mnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;cursor:pointer;border:none;background:none;color:var(--ink-soft);font-family:"Noto Sans JP",sans-serif;transition:color .2s;}
.mnav-item.active{color:var(--violet);}
.mnav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.mnav-item span{font-size:.58rem;font-weight:600;}

/* ===== ANIMATIONS ===== */
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:cardIn .28s ease both;}
</style>
</head>
<body>
<div class="bg-wrap"></div><div class="bg-noise"></div>
<div class="season-bar"></div>

<!-- HEADER -->
<header class="header" id="main-header">
  <div class="logo">
    <div class="logo-icon">c+a</div>
    <div class="logo-name">connec<span>+</span>a</div>
    <span class="admin-badge">ADMIN</span>
  </div>
  <div class="header-right">
    <button class="avatar-btn" id="avatar-btn">A</button>
  </div>
</header>

<div class="app-layout">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <button class="sidebar-item active" onclick="showSection('dashboard',this)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        ダッシュボード
      </button>
      <button class="sidebar-item" onclick="showSection('events',this)">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        イベント管理
      </button>
      <button class="sidebar-item" onclick="showSection('participants',this)">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        参加者
      </button>
      <button class="sidebar-item" onclick="showSection('qr',this)">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="4" height="4"/><line x1="22" y1="14" x2="22" y2="22"/><line x1="14" y1="22" x2="22" y2="22"/></svg>
        QRスキャン
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Communication</div>
      <button class="sidebar-item" onclick="showSection('chat',this)">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        チャット
        <span class="sidebar-badge" id="chat-badge" style="display:none;">0</span>
      </button>
      <button class="sidebar-item" onclick="showSection('news',this)">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        ニュース配信
      </button>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Tools</div>
      <button class="sidebar-item" onclick="showSection('todo',this)">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><path d="M9 5a2 2 0 002 2h2a2 2 0 002-2"/><polyline points="9 12 11 14 15 10"/></svg>
        TODO
      </button>
      <button class="sidebar-item" onclick="showSection('schedule',this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        スケジュール
      </button>
      <button class="sidebar-item" onclick="showSection('survey',this)">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        アンケート分析
      </button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- ===== DASHBOARD ===== -->
    <section id="sec-dashboard" class="sec active">
      <div class="section-head"><span class="section-head-text">ダッシュボード</span><span class="section-head-line"></span></div>
      <div class="stat-grid" id="stat-grid">
        <div class="stat-card"><div class="stat-icon stat-icon-violet"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div class="stat-num" id="ds-events">—</div><div class="stat-label">イベント総数</div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-rose"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="stat-num" id="ds-participants">—</div><div class="stat-label">参加者数</div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-amber"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><path d="M9 5a2 2 0 002 2h2a2 2 0 002-2"/><polyline points="9 12 11 14 15 10"/></svg></div><div class="stat-num" id="ds-regs">—</div><div class="stat-label">登録総数</div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-green"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="stat-num" id="ds-checkins">—</div><div class="stat-label">チェックイン</div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-sky"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div class="stat-num" id="ds-avg-rating">—</div><div class="stat-label">平均評価 /10</div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>イベント別参加者</div></div>
        <div class="card-body"><div style="position:relative;height:260px;"><canvas id="chart-events"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title"><svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>流入経路分析</div></div>
        <div class="card-body"><div style="position:relative;height:240px;"><canvas id="chart-referrals"></canvas></div></div>
      </div>
    </section>

    <!-- ===== EVENTS ===== -->
    <section id="sec-events" class="sec">
      <div class="section-head">
        <span class="section-head-text">イベント管理</span><span class="section-head-line"></span>
        <button class="btn btn-primary" onclick="openEventModal()"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新規イベント</button>
      </div>
      <div id="events-table-wrap">
        <div class="spinner"></div>
      </div>
    </section>

    <!-- ===== PARTICIPANTS ===== -->
    <section id="sec-participants" class="sec">
      <div class="section-head"><span class="section-head-text">参加者一覧</span><span class="section-head-line"></span></div>
      <div style="margin-bottom:14px;display:flex;gap:8px;">
        <input type="text" class="form-control" id="participant-search" placeholder="名前・メールで検索..." style="max-width:320px;" oninput="filterParticipants()">
      </div>
      <div id="participants-table-wrap"><div class="spinner"></div></div>
    </section>

    <!-- ===== QR SCAN ===== -->
    <section id="sec-qr" class="sec">
      <div class="section-head"><span class="section-head-text">QRチェックイン</span><span class="section-head-line"></span></div>
      <div class="card">
        <div class="card-body">
          <div class="qr-scan-area">
            <div class="qr-video-wrap" id="qr-video-wrap">
              <video id="qr-video" autoplay playsinline></video>
            </div>
            <div class="btn-row" style="justify-content:center;">
              <button class="btn btn-primary" onclick="startCamera()"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>カメラ起動</button>
              <button class="btn btn-outline" onclick="stopCamera()">停止</button>
            </div>
            <div class="qr-manual">
              <div class="form-label">手動入力</div>
              <div class="qr-manual-row">
                <input type="text" class="form-control" id="qr-manual-input" placeholder="QRコード / 登録ID...">
                <button class="btn btn-primary" onclick="manualCheckin()">チェックイン</button>
              </div>
            </div>
            <div id="qr-result"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== CHAT ===== -->
    <section id="sec-chat" class="sec">
      <div class="section-head"><span class="section-head-text">チャット</span><span class="section-head-line"></span></div>
      <div class="card" style="overflow:hidden;">
        <div style="display:flex;height:460px;">
          <div style="width:240px;border-right:1px solid var(--border);overflow-y:auto;" id="chat-thread-list"></div>
          <div style="flex:1;display:flex;flex-direction:column;">
            <div class="chat-messages" id="admin-chat-messages">
              <div class="empty-state"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><p>左からスレッドを選択</p></div>
            </div>
            <div class="chat-input-row">
              <input type="text" class="chat-input" id="admin-chat-input" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter')sendAdminChat()">
              <button class="chat-send-btn" onclick="sendAdminChat()"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>送信</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== NEWS ===== -->
    <section id="sec-news" class="sec">
      <div class="section-head">
        <span class="section-head-text">ニュース配信</span><span class="section-head-line"></span>
        <button class="btn btn-primary" onclick="openNewsModal()"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>配信作成</button>
      </div>
      <div id="news-list-admin"><div class="spinner"></div></div>
    </section>

    <!-- ===== TODO ===== -->
    <section id="sec-todo" class="sec">
      <div class="section-head"><span class="section-head-text">TODO</span><span class="section-head-line"></span></div>
      <div class="card" style="overflow:hidden;">
        <div id="todo-list"></div>
        <div class="todo-add-row">
          <input type="text" class="todo-add-input" id="todo-input" placeholder="新しいタスクを追加..." onkeydown="if(event.key==='Enter')addTodo()">
          <input type="date" class="todo-date-input" id="todo-date-input" title="期限を設定">
          <button class="btn btn-primary btn-sm" onclick="addTodo()"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
      </div>
    </section>

    <!-- ===== SCHEDULE ===== -->
    <section id="sec-schedule" class="sec">
      <div class="section-head"><span class="section-head-text">スケジュール</span><span class="section-head-line"></span></div>
      <div class="card">
        <div class="card-body">
          <div class="schedule-date-nav">
            <button class="schedule-nav-btn" onclick="shiftScheduleWeek(-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
            <div class="schedule-date-label" id="schedule-date-label"></div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="schedule-date-today" onclick="goScheduleToday()">今日</span>
              <button class="schedule-nav-btn" onclick="shiftScheduleWeek(1)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
            </div>
          </div>
          <div class="schedule-weekdays" id="schedule-weekdays"></div>
          <div id="schedule-content"></div>
          <div class="schedule-add-row">
            <input type="time" class="schedule-add-input" id="sched-add-time" style="min-width:100px;">
            <input type="text" class="schedule-add-input" id="sched-add-title" placeholder="予定タイトル..." style="flex:1;min-width:140px;">
            <input type="text" class="schedule-add-input" id="sched-add-desc" placeholder="メモ（任意）" style="flex:1;min-width:100px;">
            <button class="btn btn-primary btn-sm" onclick="addScheduleItem()"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== SURVEY ANALYSIS ===== -->
    <section id="sec-survey" class="sec">
      <div class="section-head"><span class="section-head-text">アンケート分析</span><span class="section-head-line"></span></div>
      <div id="survey-analysis-content"><div class="spinner"></div></div>
    </section>
  </main>
</div>

<!-- MOBILE NAV -->
<div class="mobile-nav" id="mobile-nav">
  <button class="mnav-item active" onclick="showSection('dashboard',this)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>ホーム</span></button>
  <button class="mnav-item" onclick="showSection('events',this)"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>イベント</span></button>
  <button class="mnav-item" onclick="showSection('qr',this)"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/></svg><span>QR</span></button>
  <button class="mnav-item" onclick="showSection('chat',this)"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>チャット</span></button>
  <button class="mnav-item" onclick="showSection('todo',this)"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><polyline points="9 12 11 14 15 10"/></svg><span>TODO</span></button>
</div>

<!-- ===== EVENT MODAL ===== -->
<div class="modal-overlay" id="event-modal" onclick="if(event.target===this)closeEventModal()">
  <div class="modal" style="max-width:720px;">
    <div class="modal-header">
      <div class="modal-title"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span id="event-modal-title">新規イベント</span></div>
      <button class="modal-close" onclick="closeEventModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div id="event-modal-alert"></div>

    <!-- Event Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchEventTab('basic',this)"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/></svg>基本情報</button>

// ===== API WITH DEMO FALLBACK =====
var GAS_URL="https://script.google.com/macros/s/AKfycbw94iJOYloTfXOeOONgwyP3MlTXOBolUdSCFO57NyfYDr-0ISYMTLwntsQxinj5c8CsFA/exec";
var USE_DEMO=false; // auto-set to true on first fetch failure

// Demo data for offline/preview use
var DEMO={
  events:[],
  participants:[],
  surveys:[],
  registrations:[]
};

async function api(a,p){
  p=p||{};
  if(!USE_DEMO){
    try{
      var r=await fetch(GAS_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body:JSON.stringify(Object.assign({action:a},p))});
      var j=await r.json();if(!j.success)throw new Error(j.error||"Error");return j.data;
    }catch(e){
      USE_DEMO=true;
    }
  }
  // Demo fallback
  return demoApi(a,p);
}

function demoApi(a,p){
  switch(a){
    case "getStats":return{eventStats:DEMO.events,participants:DEMO.participants.length};
    case "getEvents":return DEMO.events;
    case "getParticipants":return DEMO.participants;
    case "getAllRegistrations":return DEMO.registrations;
    case "getAllSurveys":return DEMO.surveys;
    case "getMySurveys":return DEMO.surveys.filter(function(s){return s.ParticipantID===(p.participantId);});
    case "createEvent":var ne={EventID:"EVT"+Date.now(),EventName:p.eventName,Date:p.date,Time:p.time,Location:p.location,Capacity:p.capacity,Price:p.price,PaymentType:p.paymentType,Description:p.description,registrationCount:0,checkinCount:0,Lat:p.lat,Lng:p.lng,customQuestions:p.customQuestions,referralOptions:p.referralOptions,msgFirst:p.msgFirst,msgReturn:p.msgReturn,restriction:p.restriction,restrictionSchools:p.restrictionSchools};DEMO.events.push(ne);return ne;
    case "updateEvent":var ei=DEMO.events.findIndex(function(e){return e.EventID===p.eventId;});if(ei>=0)Object.assign(DEMO.events[ei],{EventName:p.eventName,Date:p.date,Time:p.time,Location:p.location,Capacity:p.capacity,Price:p.price,PaymentType:p.paymentType,Description:p.description,Lat:p.lat,Lng:p.lng,customQuestions:p.customQuestions,referralOptions:p.referralOptions,msgFirst:p.msgFirst,msgReturn:p.msgReturn,restriction:p.restriction,restrictionSchools:p.restrictionSchools});return DEMO.events[ei];
    case "checkinByQR":var reg=DEMO.registrations.find(function(r){return r.QR===p.qrData||r.RegistrationID===p.qrData;});if(!reg)throw new Error("QRコードが見つかりません");reg.CheckinStatus=true;var pt=DEMO.participants.find(function(x){return x.ParticipantID===reg.ParticipantID;});var ev=DEMO.events.find(function(x){return x.EventID===reg.EventID;});return{participantName:pt?pt.Name:"Unknown",eventName:ev?ev.EventName:"Unknown"};
    default:return [];
  }
}

function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||"null");}catch(e){return null;}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v));}

function showSection(id,btn){
  document.querySelectorAll(".sec").forEach(function(s){s.classList.remove("active");s.style.display="none";});
  var sec=document.getElementById("sec-"+id);if(sec){sec.style.display="block";sec.classList.add("active");}
  document.querySelectorAll(".sidebar-item").forEach(function(b){b.classList.remove("active");});
  document.querySelectorAll(".mnav-item").forEach(function(b){b.classList.remove("active");});
  if(btn)btn.classList.add("active");
  currentSection=id;
  window.scrollTo({top:0,behavior:"smooth"});
  if(id==="dashboard")loadDashboard();
  else if(id==="events")loadEventsTable();
  else if(id==="participants")loadParticipantsTable();
  else if(id==="chat")loadChatThreads();
  else if(id==="news")loadNewsAdmin();
  else if(id==="todo")renderTodos();
  else if(id==="schedule")renderSchedule();
  else if(id==="survey")loadSurveyAnalysis();
}

// ===== DASHBOARD =====
var chartInstances={};
async function loadDashboard(){
  try{
    var stats=await api("getStats");
    var es=stats.eventStats||[];var ps=stats.participants||0;
    document.getElementById("ds-events").textContent=es.length;
    document.getElementById("ds-participants").textContent=ps;
    var totalRegs=es.reduce(function(s,e){return s+(Number(e.registrationCount)||0);},0);
    var totalCheckins=es.reduce(function(s,e){return s+(Number(e.checkinCount)||0);},0);
    document.getElementById("ds-regs").textContent=totalRegs;
    document.getElementById("ds-checkins").textContent=totalCheckins;

    // Avg rating
    var surveys=[];try{surveys=await api("getAllSurveys");}catch(e){}
    var rated=surveys.filter(function(s){return s.Rating&&Number(s.Rating)>0;});
    var avg=rated.length?rated.reduce(function(s,r){return s+Number(r.Rating);},0)/rated.length:0;
    document.getElementById("ds-avg-rating").textContent=avg?avg.toFixed(1):"—";

    // Event chart
    var ctx=document.getElementById("chart-events");
    if(chartInstances.events)chartInstances.events.destroy();
    chartInstances.events=new Chart(ctx,{type:"bar",data:{labels:es.map(function(e){return e.EventName.length>12?e.EventName.slice(0,12)+"…":e.EventName;}),datasets:[
      {label:"登録",data:es.map(function(e){return Number(e.registrationCount)||0;}),backgroundColor:"rgba(112,96,168,.6)",borderRadius:6,borderSkipped:false},
      {label:"チェックイン",data:es.map(function(e){return Number(e.checkinCount)||0;}),backgroundColor:"rgba(61,102,64,.5)",borderRadius:6,borderSkipped:false}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{usePointStyle:true,pointStyle:"circle",padding:14,font:{size:11}}}},scales:{y:{beginAtZero:true,ticks:{stepSize:5}}}}});

    // Referral chart (demo data if no real data)
    var refCtx=document.getElementById("chart-referrals");
    if(chartInstances.referrals)chartInstances.referrals.destroy();
    var refData=getReferralStats(surveys);
    chartInstances.referrals=new Chart(refCtx,{type:"doughnut",data:{labels:refData.labels,datasets:[{data:refData.values,backgroundColor:["rgba(232,160,184,.7)","rgba(112,96,168,.7)","rgba(200,90,32,.7)","rgba(122,168,204,.7)","rgba(61,102,64,.5)"],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{usePointStyle:true,pointStyle:"circle",padding:12,font:{size:11}}}}}});
  }catch(err){console.error("Dashboard load error:",err);}
}

function getReferralStats(surveys){
  var counts={};surveys.forEach(function(s){if(s.ReferralSource){var k=s.ReferralSource;counts[k]=(counts[k]||0)+1;}});
  var labels=Object.keys(counts);var values=Object.values(counts);
  if(!labels.length){labels=["SNS","友人","検索","チラシ","その他"];values=[12,8,5,3,2];}
  return{labels:labels,values:values};
}

var allEventsAdmin=[];
async function loadEventsTable(){
  var wrap=document.getElementById("events-table-wrap");
  wrap.innerHTML='<div class="spinner"></div>';
  try{
    allEventsAdmin=await api("getEvents");
    if(!allEventsAdmin.length){wrap.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg><p>イベントがありません</p></div>';return;}
    wrap.innerHTML='<div class="table-wrap"><table><thead><tr><th>イベント名</th><th>日付</th><th>会場</th><th>定員</th><th>登録/定員</th><th>料金</th><th>操作</th></tr></thead><tbody>'+allEventsAdmin.map(function(ev){
      var regCount=Number(ev.registrationCount||0);var cap=Number(ev.Capacity);var pct=cap?Math.round(regCount/cap*100):0;

    }).join("")+'</tbody></table></div>';
  }catch(err){wrap.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';}
}

// ===== EVENT MODAL =====
var editingEventId=null;
var eventCustomQuestions=[];
var eventReferralOptions=["SNS","友人紹介","Web検索","チラシ","その他"];

function openEventModal(eventId){
  editingEventId=eventId||null;
  document.getElementById("event-modal-title").textContent=eventId?"イベント編集":"新規イベント";
  document.getElementById("event-modal-alert").innerHTML="";
  // Reset
  ["ev-name","ev-date","ev-time","ev-desc","ev-location","ev-lat","ev-lng","ev-venue-search","ev-msg-first","ev-msg-return","ev-restriction-schools"].forEach(function(id){var el=document.getElementById(id);if(el)el.value="";});
  document.getElementById("ev-capacity").value="";
  document.getElementById("ev-price").value="";
  document.getElementById("ev-payment-type").value="FREE";
  eventCustomQuestions=[];
  renderCustomQuestionsList();
  renderReferralTags();
  resetVenueMap();
  switchEventTab("basic",document.querySelector(".tab-bar .tab-btn"));
  document.getElementById("event-modal").classList.add("open");

  if(eventId){
    var ev=allEventsAdmin.find(function(e){return e.EventID===eventId;});
    if(ev){
      document.getElementById("ev-name").value=ev.EventName||"";
      document.getElementById("ev-date").value=ev.Date||"";
      document.getElementById("ev-time").value=ev.Time||"";
      document.getElementById("ev-capacity").value=ev.Capacity||"";
      document.getElementById("ev-price").value=ev.Price||"";
      document.getElementById("ev-payment-type").value=ev.PaymentType||"FREE";
      document.getElementById("ev-desc").value=ev.Description||"";
      document.getElementById("ev-location").value=ev.Location||"";
      if(ev.Lat)document.getElementById("ev-lat").value=ev.Lat;
      if(ev.Lng)document.getElementById("ev-lng").value=ev.Lng;
      if(ev.Lat&&ev.Lng)updateVenueMap();
      if(ev.customQuestions)eventCustomQuestions=JSON.parse(JSON.stringify(ev.customQuestions));
      if(ev.referralOptions)eventReferralOptions=ev.referralOptions.slice();
      if(ev.msgFirst)document.getElementById("ev-msg-first").value=ev.msgFirst;
      if(ev.msgReturn)document.getElementById("ev-msg-return").value=ev.msgReturn;
      if(ev.restriction){
        selectRestriction(ev.restriction,document.querySelector('.restriction-option input[value="'+ev.restriction+'"]')?.closest('.restriction-option'));
        if(ev.restrictionSchools)document.getElementById("ev-restriction-schools").value=ev.restrictionSchools;
      }
      renderCustomQuestionsList();
      renderReferralTags();
    }
  }
}

function closeEventModal(){document.getElementById("event-modal").classList.remove("open");}
function editEvent(id){openEventModal(id);}

function switchEventTab(tab,btn){
  document.querySelectorAll("#event-modal .tab-btn").forEach(function(b){b.classList.remove("active");});
  if(btn)btn.classList.add("active");
  ["basic","venue","registration","advanced"].forEach(function(t){
    var pane=document.getElementById("evtab-"+t);if(pane){pane.classList.remove("active");pane.style.display="none";}
  });
  var target=document.getElementById("evtab-"+tab);
  if(target){target.style.display="block";target.classList.add("active");}
}

async function saveEvent(){
  var alertEl=document.getElementById("event-modal-alert");alertEl.innerHTML="";
  var name=document.getElementById("ev-name").value.trim();
  if(!name){alertEl.innerHTML='<div class="alert alert-err">イベント名は必須です</div>';return;}
  var btn=document.getElementById("ev-save-btn");btn.disabled=true;btn.textContent="保存中...";
  var data={
    eventName:name,date:document.getElementById("ev-date").value.trim(),
    time:document.getElementById("ev-time").value.trim(),
    capacity:Number(document.getElementById("ev-capacity").value)||30,
    price:Number(document.getElementById("ev-price").value)||0,
    paymentType:document.getElementById("ev-payment-type").value,
    description:document.getElementById("ev-desc").value.trim(),
    location:document.getElementById("ev-location").value.trim(),
    lat:document.getElementById("ev-lat").value.trim(),
    lng:document.getElementById("ev-lng").value.trim(),
    customQuestions:eventCustomQuestions,
    referralOptions:eventReferralOptions,
    msgFirst:document.getElementById("ev-msg-first").value.trim(),
    msgReturn:document.getElementById("ev-msg-return").value.trim(),
    restriction:document.querySelector('input[name="ev-restriction"]:checked')?.value||"none",
    restrictionSchools:document.getElementById("ev-restriction-schools").value.trim()
  };
  try{
    if(editingEventId){data.eventId=editingEventId;await api("updateEvent",data);}
    else{await api("createEvent",data);}
    closeEventModal();loadEventsTable();if(currentSection==="dashboard")loadDashboard();
    alertEl.innerHTML='<div class="alert alert-ok">保存しました</div>';
  }catch(err){alertEl.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';}
  btn.disabled=false;btn.textContent="保存";
}

// ===== CUSTOM QUESTION BUILDER =====
var editingCQIndex=-1;
function renderCustomQuestionsList(){
  var list=document.getElementById("cq-list");if(!list)return;
  if(!eventCustomQuestions.length){list.innerHTML='<div style="text-align:center;padding:12px;color:var(--ink-soft);font-size:.78rem;">カスタム質問なし</div>';return;}
  list.innerHTML=eventCustomQuestions.map(function(q,i){
    var typeLabel={text:"テキスト",single:"単一選択",multiple:"複数選択"}[q.type]||q.type;
    return '<div class="cq-item"><div class="cq-item-header"><span class="cq-item-type">'+typeLabel+'</span><div class="cq-item-actions"><button class="btn-icon" onclick="openCQEdit('+i+')"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="btn-icon" onclick="removeCQ('+i+')"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div></div><div class="cq-item-label">'+esc(q.label)+'</div>'+(q.options&&q.options.length?'<div class="cq-item-options">'+q.options.map(function(o){return esc(o);}).join(" / ")+'</div>':'')+'</div>';
  }).join("");
}
function addCustomQuestion(type){
  editingCQIndex=-1;
  document.getElementById("cq-modal-title").textContent="質問を追加";
  document.getElementById("cq-label").value="";
  document.getElementById("cq-options").value="";
  document.getElementById("cq-options-group").style.display=(type==="text")?"none":"block";
  document.getElementById("cq-modal").dataset.type=type;
  document.getElementById("cq-modal").classList.add("open");
}
function openCQEdit(idx){
  var q=eventCustomQuestions[idx];if(!q)return;
  editingCQIndex=idx;
  document.getElementById("cq-modal-title").textContent="質問を編集";
  document.getElementById("cq-label").value=q.label;
  document.getElementById("cq-options").value=(q.options||[]).join("\n");
  document.getElementById("cq-options-group").style.display=(q.type==="text")?"none":"block";
  document.getElementById("cq-modal").dataset.type=q.type;
  document.getElementById("cq-modal").classList.add("open");
}
function closeCQModal(){document.getElementById("cq-modal").classList.remove("open");}
function saveCQ(){
  var label=document.getElementById("cq-label").value.trim();if(!label)return;
  var type=document.getElementById("cq-modal").dataset.type;
  var optionsRaw=document.getElementById("cq-options").value.trim();
  var options=optionsRaw?optionsRaw.split("\n").map(function(o){return o.trim();}).filter(Boolean):[];
  var q={type:type,label:label,options:options};
  if(editingCQIndex>=0){eventCustomQuestions[editingCQIndex]=q;}
  else{eventCustomQuestions.push(q);}
  closeCQModal();renderCustomQuestionsList();
}
function removeCQ(idx){eventCustomQuestions.splice(idx,1);renderCustomQuestionsList();}

// ===== QR SCANNER =====
var cameraStream=null;
function startCamera(){
  var video=document.getElementById("qr-video");
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(function(stream){
    cameraStream=stream;video.srcObject=stream;video.play();
    // In production, integrate with a QR scanning library like jsQR
  }).catch(function(err){
    document.getElementById("qr-result").innerHTML='<div class="alert alert-err">カメラにアクセスできません: '+esc(err.message)+'</div>';
  });
}
function stopCamera(){
  if(cameraStream){cameraStream.getTracks().forEach(function(t){t.stop();});cameraStream=null;}
  document.getElementById("qr-video").srcObject=null;
}
async function manualCheckin(){
  var input=document.getElementById("qr-manual-input");var code=input.value.trim();
  if(!code){return;}
  var resultEl=document.getElementById("qr-result");resultEl.innerHTML='<div class="spinner" style="margin:8px auto;"></div>';
  try{
    var result=await api("checkinByQR",{qrData:code});
    resultEl.innerHTML='<div class="qr-result">'+icon("checkCircle","icon-xl")+'<div style="margin-top:8px;font-weight:700;color:var(--green);">チェックイン完了</div><div style="font-size:.82rem;margin-top:4px;">'+esc(result.participantName||"")+'</div><div style="font-size:.72rem;color:var(--ink-soft);">'+esc(result.eventName||"")+'</div></div>';
    input.value="";
  }catch(err){
    resultEl.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';
  }
}

// ===== CHAT =====
var activeChatUser=null;
function loadChatThreads(){
  var allChats=lsGet("connecplus_chat")||[];
  var threads={};allChats.forEach(function(m){
    var uid=m.senderId==="ADMIN"?m.receiverId:m.senderId;
    if(!threads[uid])threads[uid]={userId:uid,name:m.senderId==="ADMIN"?m.receiverName||uid:m.senderName||uid,messages:[]};
    threads[uid].messages.push(m);
  });
  var list=document.getElementById("chat-thread-list");
  var threadArr=Object.values(threads).sort(function(a,b){
    var la=a.messages[a.messages.length-1];var lb=b.messages[b.messages.length-1];
    return new Date(lb.createdAt)-new Date(la.createdAt);
  });
  if(!threadArr.length){list.innerHTML='<div class="empty-state" style="padding:30px 10px;"><svg viewBox="0 0 24 24" style="width:32px;height:32px;"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><p style="font-size:.76rem;">メッセージなし</p></div>';return;}
  list.innerHTML=threadArr.map(function(t){
    var last=t.messages[t.messages.length-1];var time=new Date(last.createdAt).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    return '<div class="chat-thread'+(activeChatUser===t.userId?' active':'')+'" onclick="openChatThread(\''+esc(t.userId)+'\')"><div class="chat-thread-avatar">'+esc((t.name||"U").charAt(0).toUpperCase())+'</div><div class="chat-thread-info"><div class="chat-thread-name">'+esc(t.name)+'</div><div class="chat-thread-preview">'+esc(last.text)+'</div></div><div class="chat-thread-time">'+time+'</div></div>';
  }).join("");
}
function openChatThread(userId){
  activeChatUser=userId;
  var allChats=lsGet("connecplus_chat")||[];
  var msgs=allChats.filter(function(m){return m.senderId===userId||m.receiverId===userId;});
  var area=document.getElementById("admin-chat-messages");
  area.innerHTML=msgs.map(function(m){
    var isAdmin=m.senderId==="ADMIN";
    var time=new Date(m.createdAt).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    return '<div class="chat-bubble '+(isAdmin?'admin':'user')+'"><div style="font-size:.82rem;">'+esc(m.text)+'</div><div class="chat-bubble-time">'+time+'</div></div>';
  }).join("");
  area.scrollTop=area.scrollHeight;
  // Mark thread active
  document.querySelectorAll(".chat-thread").forEach(function(t){t.classList.remove("active");});
  loadChatThreads();
}
function sendAdminChat(){
  if(!activeChatUser)return;
  var input=document.getElementById("admin-chat-input");var text=input.value.trim();if(!text)return;
  var allChats=lsGet("connecplus_chat")||[];
  var msg={id:Date.now()+"_admin",senderId:"ADMIN",receiverId:activeChatUser,senderName:"Admin",text:text,createdAt:new Date().toISOString(),isRead:false};
  allChats.push(msg);lsSet("connecplus_chat",allChats);
  input.value="";openChatThread(activeChatUser);
}

function loadNewsAdmin(){
  var allNews=lsGet("connecplus_news")||[];
  var list=document.getElementById("news-list-admin");
  if(!allNews.length){list.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg><p>ニュースなし</p></div>';return;}
  list.innerHTML=allNews.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);}).map(function(n){
    var date=new Date(n.createdAt).toLocaleDateString("ja-JP",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
    return '<div class="card" style="padding:14px 18px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;"><strong style="font-size:.88rem;">'+esc(n.title)+'</strong><span class="badge '+(n.type==="personal"?"badge-amber":"badge-violet")+'">'+(n.type==="personal"?"個別":"全体")+'</span></div><div style="font-size:.78rem;color:var(--ink-soft);">'+esc(n.body)+'</div><div style="font-size:.66rem;color:var(--ink-pale);margin-top:6px;">'+date+'</div></div>';
  }).join("");
}

// ===== TODO =====
function getTodos(){return lsGet("admin_todos")||[];}
function saveTodos(t){lsSet("admin_todos",t);}
function todoDueClass(due){
  if(!due)return "todo-due-none";
  var today=new Date();today.setHours(0,0,0,0);
  var d=new Date(due+"T00:00:00");
  var diff=Math.ceil((d-today)/(86400000));
  if(diff<0)return "todo-due-overdue";
  if(diff<=2)return "todo-due-soon";
  return "todo-due-normal";
}
function formatDue(due){
  if(!due)return "期限なし";
  var d=new Date(due+"T00:00:00");
  var m=d.getMonth()+1;var day=d.getDate();
  var dows=["日","月","火","水","木","金","土"];
  return m+"/"+day+" ("+dows[d.getDay()]+")";
}
function renderTodos(){
  var todos=getTodos();var list=document.getElementById("todo-list");
  if(!todos.length){list.innerHTML='<div class="empty-state" style="padding:30px;"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p>タスクなし</p></div>';return;}
  // Sort: incomplete first (overdue → soon → normal → no date), then done
  var sorted=todos.map(function(t,i){return{t:t,i:i};});
  sorted.sort(function(a,b){
    if(a.t.done!==b.t.done)return a.t.done?1:-1;
    if(!a.t.done){
      var aP=a.t.due?todoDueClass(a.t.due)==="todo-due-overdue"?0:todoDueClass(a.t.due)==="todo-due-soon"?1:2:3;
      var bP=b.t.due?todoDueClass(b.t.due)==="todo-due-overdue"?0:todoDueClass(b.t.due)==="todo-due-soon"?1:2:3;
      if(aP!==bP)return aP-bP;
      if(a.t.due&&b.t.due)return new Date(a.t.due)-new Date(b.t.due);
    }
    return 0;
  });
  list.innerHTML=sorted.map(function(item){
    var todo=item.t;var i=item.i;
    var dueHtml=todo.due?'<div class="todo-due '+todoDueClass(todo.due)+'">'+formatDue(todo.due)+'</div>':'';
    return '<div class="todo-item"><div class="todo-check'+(todo.done?" done":"")+'" onclick="toggleTodo('+i+')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="todo-text'+(todo.done?" done":"")+'">'+esc(todo.text)+'</div>'+dueHtml+'<button class="btn-icon" style="width:24px;height:24px;" onclick="removeTodo('+i+')"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
  }).join("");
}
function addTodo(){
  var input=document.getElementById("todo-input");var text=input.value.trim();if(!text)return;
  var dateInput=document.getElementById("todo-date-input");var due=dateInput.value||"";
  var todos=getTodos();todos.push({text:text,done:false,due:due});saveTodos(todos);
  input.value="";dateInput.value="";renderTodos();
  // Also add to schedule if due date is set
  if(due)renderScheduleIfActive();
}
function toggleTodo(i){var todos=getTodos();if(todos[i])todos[i].done=!todos[i].done;saveTodos(todos);renderTodos();renderScheduleIfActive();}
function removeTodo(i){var todos=getTodos();todos.splice(i,1);saveTodos(todos);renderTodos();renderScheduleIfActive();}
function renderScheduleIfActive(){if(currentSection==="schedule")renderSchedule();}

// ===== SCHEDULE =====
var scheduleDate=new Date();
scheduleDate.setHours(0,0,0,0);
function getScheduleItems(){return lsGet("admin_schedule")||[];}
function saveScheduleItems(s){lsSet("admin_schedule",s);}

function dateToKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function getWeekStart(d){var w=new Date(d);var day=w.getDay();w.setDate(w.getDate()-day);w.setHours(0,0,0,0);return w;}

function renderSchedule(){
  var today=new Date();today.setHours(0,0,0,0);
  var selKey=dateToKey(scheduleDate);
  var weekStart=getWeekStart(scheduleDate);
  var dows=["日","月","火","水","木","金","土"];
  var months=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

  // Date label
  var label=document.getElementById("schedule-date-label");
  var isToday=selKey===dateToKey(today);
  label.innerHTML=scheduleDate.getFullYear()+"年 "+months[scheduleDate.getMonth()]+" "+scheduleDate.getDate()+"日"
    +' <span class="schedule-date-sub">'+dows[scheduleDate.getDay()]+"曜日"+(isToday?" — 今日":"")+"</span>";

  // Weekday strip
  var wdEl=document.getElementById("schedule-weekdays");
  var wdHtml="";
  for(var i=0;i<7;i++){
    var d=new Date(weekStart);d.setDate(d.getDate()+i);
    var key=dateToKey(d);var isSel=key===selKey;var isT=key===dateToKey(today);
    wdHtml+='<div class="schedule-weekday'+(isSel?" active":"")+(isT?" today":"")+'" onclick="selectScheduleDay(\''+key+'\')">'
      +'<div class="schedule-wd-name">'+dows[d.getDay()]+'</div>'
      +'<div class="schedule-wd-num">'+d.getDate()+'</div></div>';
  }
  wdEl.innerHTML=wdHtml;

  // Content: schedule items + TODO items for this date
  var content=document.getElementById("schedule-content");
  var allItems=getScheduleItems().filter(function(s){return s.date===selKey;});
  allItems.sort(function(a,b){return(a.time||"").localeCompare(b.time||"");});

  // TODO items due on this date
  var todos=getTodos().filter(function(t){return t.due===selKey&&!t.done;});

  if(!allItems.length&&!todos.length){
    content.innerHTML='<div class="schedule-empty">'+icon("calendar","icon-xl")+'<div style="margin-top:8px;">この日の予定はありません</div></div>';
    return;
  }

  var html="";
  if(allItems.length){
    html+='<div class="schedule-section-label">'+icon("clock","icon-sm")+' スケジュール</div>';
    html+=allItems.map(function(s,idx){
      return '<div class="schedule-item"><div class="schedule-time">'+esc(s.time||"--:--")+'</div><div class="schedule-body"><div class="schedule-title">'+esc(s.title)+'</div>'+(s.desc?'<div class="schedule-desc">'+esc(s.desc)+'</div>':'')+'</div><button class="btn-icon" style="width:24px;height:24px;" onclick="removeScheduleItem(\''+selKey+'\','+idx+')"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
    }).join("");
  }
  if(todos.length){
    html+='<div class="schedule-section-label">'+icon("check","icon-sm")+' TODO（期限）</div>';
    html+=todos.map(function(t){
      return '<div class="schedule-item"><div class="schedule-time" style="color:var(--amber);">TODO</div><div class="schedule-body"><div class="schedule-title">'+esc(t.text)+'</div><div class="schedule-desc">期限: '+formatDue(t.due)+'</div></div></div>';
    }).join("");
  }
  content.innerHTML=html;
}

function selectScheduleDay(key){
  var parts=key.split("-");scheduleDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  renderSchedule();
}
function shiftScheduleWeek(dir){scheduleDate.setDate(scheduleDate.getDate()+7*dir);renderSchedule();}
function goScheduleToday(){scheduleDate=new Date();scheduleDate.setHours(0,0,0,0);renderSchedule();}

function addScheduleItem(){
  var time=document.getElementById("sched-add-time").value;
  var title=document.getElementById("sched-add-title").value.trim();
  if(!title)return;
  var desc=document.getElementById("sched-add-desc").value.trim();
  var key=dateToKey(scheduleDate);
  var items=getScheduleItems();items.push({date:key,time:time,title:title,desc:desc});
  saveScheduleItems(items);
  document.getElementById("sched-add-time").value="";
  document.getElementById("sched-add-title").value="";
  document.getElementById("sched-add-desc").value="";
  renderSchedule();
}
function removeScheduleItem(dateKey,idx){
  var items=getScheduleItems();
  var dateItems=[];var otherItems=[];
  items.forEach(function(s){if(s.date===dateKey)dateItems.push(s);else otherItems.push(s);});
  dateItems.splice(idx,1);
  saveScheduleItems(otherItems.concat(dateItems));
  renderSchedule();
}

// ===== SURVEY ANALYSIS (10-scale) =====
async function loadSurveyAnalysis(){
  var el=document.getElementById("survey-analysis-content");
  el.innerHTML='<div class="spinner"></div>';
  try{
    var surveys=await api("getAllSurveys");
    var rated=surveys.filter(function(s){return s.Rating&&Number(s.Rating)>0;});
    if(!rated.length){el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><p>アンケートデータなし</p></div>';return;}
    
    // Overall stats
    var avg=rated.reduce(function(s,r){return s+Number(r.Rating);},0)/rated.length;
    var dist=Array(10).fill(0);
    rated.forEach(function(r){var v=Math.min(10,Math.max(1,Math.round(Number(r.Rating))));dist[v-1]++;});
    var maxCount=Math.max.apply(null,dist);

    var html='<div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px;">';
    html+='<div class="card" style="padding:20px;flex:0 0 160px;text-align:center;"><div class="survey-avg">'+avg.toFixed(1)+'</div><div class="survey-avg-label">平均評価 / 10</div><div style="margin-top:8px;font-size:.74rem;color:var(--ink-soft);">'+rated.length+' 回答</div></div>';
    html+='<div class="card" style="padding:20px;flex:1;min-width:280px;"><div style="font-size:.82rem;font-weight:600;color:var(--ink-mid);margin-bottom:10px;">評価分布</div>';
    for(var i=9;i>=0;i--){
      var pct=maxCount?(dist[i]/maxCount*100):0;
      html+='<div class="survey-stat-bar"><div class="survey-stat-label">'+(i+1)+'</div><div style="flex:1;height:22px;background:var(--bg2);border-radius:4px;overflow:hidden;"><div class="survey-stat-fill" style="width:'+pct+'%;">'+( dist[i]>0?dist[i]:'')+'</div></div><div class="survey-stat-count">'+dist[i]+'</div></div>';
    }
    html+='</div></div>';

    // Per-event breakdown
    var eventMap={};rated.forEach(function(s){
      if(!eventMap[s.EventID])eventMap[s.EventID]={name:s.EventName||s.EventID,ratings:[],comments:[]};
      eventMap[s.EventID].ratings.push(Number(s.Rating));
      if(s.Comment)eventMap[s.EventID].comments.push(s.Comment);
    });
    html+='<div class="card"><div class="card-header"><div class="card-title">'+icon("barChart","icon-md")+' イベント別分析</div></div><div class="card-body"><div class="table-wrap"><table><thead><tr><th>イベント</th><th>回答数</th><th>平均</th><th>最高</th><th>最低</th></tr></thead><tbody>';
    Object.values(eventMap).forEach(function(ev){
      var evAvg=ev.ratings.reduce(function(s,r){return s+r;},0)/ev.ratings.length;
      var evMax=Math.max.apply(null,ev.ratings);var evMin=Math.min.apply(null,ev.ratings);
      html+='<tr><td><strong>'+esc(ev.name)+'</strong></td><td>'+ev.ratings.length+'</td><td><span class="badge badge-violet">'+evAvg.toFixed(1)+'</span></td><td>'+evMax+'</td><td>'+evMin+'</td></tr>';
    });
    html+='</tbody></table></div></div></div>';

    // Comments
    var allComments=[];Object.values(eventMap).forEach(function(ev){ev.comments.forEach(function(c){allComments.push({event:ev.name,comment:c});});});
    if(allComments.length){
      html+='<div class="card"><div class="card-header"><div class="card-title">'+icon("msgCircle","icon-md")+' コメント一覧</div></div><div class="card-body">';
      allComments.forEach(function(c){
        html+='<div style="padding:8px 0;border-bottom:1px solid var(--border);"><div style="font-size:.72rem;color:var(--ink-soft);margin-bottom:2px;">'+esc(c.event)+'</div><div style="font-size:.82rem;">'+esc(c.comment)+'</div></div>';
      });
      html+='</div></div>';
    }

    // Chart
    html+='<div class="card"><div class="card-header"><div class="card-title">'+icon("star","icon-md")+' 評価推移</div></div><div class="card-body"><div style="position:relative;height:240px;"><canvas id="survey-trend-chart"></canvas></div></div></div>';

    el.innerHTML=html;

    // Render trend chart
    var trendCtx=document.getElementById("survey-trend-chart");
    if(trendCtx){
      var evNames=Object.values(eventMap).map(function(ev){return ev.name.length>10?ev.name.slice(0,10)+"…":ev.name;});
      var evAvgs=Object.values(eventMap).map(function(ev){return ev.ratings.reduce(function(s,r){return s+r;},0)/ev.ratings.length;});
      if(chartInstances.surveyTrend)chartInstances.surveyTrend.destroy();
      chartInstances.surveyTrend=new Chart(trendCtx,{type:"line",data:{labels:evNames,datasets:[{label:"平均評価",data:evAvgs,borderColor:"rgba(112,96,168,.9)",backgroundColor:"rgba(112,96,168,.1)",fill:true,tension:.3,pointBackgroundColor:"var(--violet)",pointRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:10,ticks:{stepSize:2}}}}});
    }
  }catch(err){el.innerHTML='<div class="alert alert-err">'+esc(err.message)+'</div>';}
}
